substitutions:
  _AGENT_TRIGGER_NAME: agent-build
  _AGENT_BRANCH: main

steps:
  - id: trigger-agent-build
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        gcloud builds triggers run "${_AGENT_TRIGGER_NAME}" \
          --project "${PROJECT_ID}" \
          --branch "${_AGENT_BRANCH}"

options:
  logging: CLOUD_LOGGING_ONLY
